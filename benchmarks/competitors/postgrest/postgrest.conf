## PostgREST 14 config for benchmark.
## Run: postgrest postgrest.conf

db-uri        = "postgres:///ecom?host=/var/run/postgresql"
db-schemas    = "public"
db-anon-role  = "kaan"
db-pool       = 32
db-pool-acquisition-timeout = 5

server-host   = "127.0.0.1"
server-port   = 9001

## Disable structured logging overhead during the benchmark.
log-level     = "warn"
